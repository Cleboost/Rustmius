name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Type de mise à jour'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      version_only: ${{ steps.bump.outputs.version_only }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Version
        id: bump
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          LEVEL="${{ github.event.inputs.level }}"
          
          if [ "$LEVEL" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$LEVEL" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          VERSION_ONLY="$MAJOR.$MINOR.$PATCH"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_only=$VERSION_ONLY" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        run: |
          VERSION="${{ steps.bump.outputs.version_only }}"
          # Utilisation de awk pour ne modifier que la version dans le bloc [package]
          awk '/^\[package\]/ {print; p=1; next} p && /^version =/ {print "version = \"'$VERSION'\""; p=0; next} {print}' Cargo.toml > Cargo.toml.tmp && mv Cargo.toml.tmp Cargo.toml
          # Mettre à jour proprement le Cargo.lock
          cargo update --workspace

      - name: Commit and Push
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Cargo.toml Cargo.lock
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
            git push
          fi
          
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.suffix }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cpu: generic
            suffix: x86_64
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v3
            suffix: x86_64-v3
          - target: aarch64-unknown-linux-gnu
            cpu: generic
            suffix: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install dependencies (Multi-Arch ARM supported)
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            sudo sed -i "s|http://archive.ubuntu.com/ubuntu/|http://ports.ubuntu.com/ubuntu-ports/|g" /etc/apt/sources.list
            sudo sed -i "s|http://security.ubuntu.com/ubuntu/|http://ports.ubuntu.com/ubuntu-ports/|g" /etc/apt/sources.list
            
            echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/amd64.list
            echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ $(lsb_release -sc)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/amd64.list
            echo "deb [arch=amd64] http://security.ubuntu.com/ubuntu/ $(lsb_release -sc)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/amd64.list
            
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -sc)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            
            sudo rm /etc/apt/sources.list

            sudo apt-get update
            sudo apt-get install -y libgtk-4-dev:arm64 libvte-2.91-gtk4-dev:arm64 libadwaita-1-dev:arm64 gcc-aarch64-linux-gnu pkg-config
          else
            sudo apt-get update
            sudo apt-get install -y libgtk-4-dev libvte-2.91-gtk4-dev libadwaita-1-dev
          fi

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build (Performance optimized)
        run: |
          export RUSTFLAGS="-C target-cpu=${{ matrix.cpu }}"
          # On désactive les flags spécifiques si CPU == generic (x86_64 standard ou aarch64)
          if [ "${{ matrix.cpu }}" = "generic" ]; then export RUSTFLAGS=""; fi
          
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC=aarch64-linux-gnu-gcc
          fi
          
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare binary
        run: |
          cd target/${{ matrix.target }}/release
          strip rustmius || true
          mv rustmius rustmius-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/rustmius-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: [build, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.new_version }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          files: artifacts/rustmius-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
