name: Release

on:
  workflow_dispatch:
    inputs:
      level:
        description: 'Type de mise à jour'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate Version
        id: bump
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n1)
          
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          LEVEL="${{ github.event.inputs.level }}"
          
          if [ "$LEVEL" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$LEVEL" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
          VERSION_ONLY="$MAJOR.$MINOR.$PATCH"
          
          echo "Bumping $LATEST_TAG -> $NEW_VERSION ($LEVEL)"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "version_only=$VERSION_ONLY" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        run: |
          VERSION="${{ steps.bump.outputs.version_only }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          cargo metadata --format-version 1 > /dev/null # Updates Cargo.lock if needed

      - name: Commit and Push
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Cargo.toml Cargo.lock
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "Pas de changements dans Cargo.toml, skip du commit."
          else
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
            git push
          fi
          
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    name: Build (${{ matrix.suffix }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cpu: generic
            suffix: x86_64
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v3
            suffix: x86_64-v3
          - target: aarch64-unknown-linux-gnu
            cpu: generic
            suffix: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libvte-2.91-gtk4-dev libadwaita-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build (Super Optimized)
        run: |
          export RUSTFLAGS="-C target-cpu=${{ matrix.cpu }}"
          if [ "${{ matrix.cpu }}" = "generic" ]; then export RUSTFLAGS=""; fi
          
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cross build --release --target ${{ matrix.target }}
          fi

      - name: Prepare binary
        run: |
          cd target/${{ matrix.target }}/release
          strip rustmius || true
          mv rustmius rustmius-${{ matrix.suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/rustmius-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: [build, prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.new_version }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          files: artifacts/rustmius-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
